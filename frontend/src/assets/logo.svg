<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="10" fill="#212529" />

  <!-- Origin node (the member / contact) -->
  <circle cx="24" cy="11" r="5.5" fill="#0d6efd" />

  <!-- Stem from origin to branch point -->
  <line x1="24" y1="16.5" x2="24" y2="21.5" stroke="white" stroke-width="2.5" stroke-linecap="round" />

  <!-- Branch junction -->
  <circle cx="24" cy="24" r="2.5" fill="white" />

  <!-- Left arm to destination -->
  <line x1="22" y1="26" x2="13" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round" />

  <!-- Right arm to destination -->
  <line x1="26" y1="26" x2="35" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round" />

  <!-- Left destination node -->
  <circle cx="11" cy="36.5" r="5.5" fill="#0d6efd" />

  <!-- Right destination node -->
  <circle cx="37" cy="36.5" r="5.5" fill="#0d6efd" />
</svg>